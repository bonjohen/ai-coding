<a href="{{ certBasePath }}{{ provider.slug }}/" class="card cert-provider-card" style="--cert-brand: {{ provider.brandColor }}">
  <div class="cert-provider-card__header">
    <h3 class="cert-provider-card__name">{{ provider.name }}</h3>
    <span class="cert-provider-card__count">{{ provider.examCount }} exams</span>
  </div>
  <p class="cert-provider-card__cta">View exams &rarr;</p>
</a>
