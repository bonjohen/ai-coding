</section>

  <noscript>

        <li><a href="{{ basePath }}{{ family.slug }}/projects/">Example Projects</a> — hands-on walkthroughs</li>
        <li><a href="{{ basePath }}{{ family.slug }}/roadmap/">Roadmap</a> — staged learning progression</li>
      </ul>
    </section>
  </noscript>
</div>
