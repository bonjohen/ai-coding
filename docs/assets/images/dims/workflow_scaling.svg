<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c080e0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="11.15"/>

  <!-- Flowchart: top node splits to three -->
  <rect x="9.5" y="5" width="5" height="3" rx="0.8"/>
  <line x1="12" y1="8" x2="12" y2="10"/>

  <line x1="12" y1="10" x2="6" y2="10"/>
  <line x1="12" y1="10" x2="18" y2="10"/>

  <line x1="6" y1="10" x2="6" y2="12"/>
  <line x1="12" y1="10" x2="12" y2="12"/>
  <line x1="18" y1="10" x2="18" y2="12"/>

  <rect x="3.8" y="12" width="4.4" height="3" rx="0.8"/>
  <rect x="9.8" y="12" width="4.4" height="3" rx="0.8"/>
  <rect x="15.8" y="12" width="4.4" height="3" rx="0.8"/>

  <!-- Converge back -->
  <line x1="6" y1="15" x2="6" y2="16.5"/>
  <line x1="12" y1="15" x2="12" y2="16.5"/>
  <line x1="18" y1="15" x2="18" y2="16.5"/>
  <line x1="6" y1="16.5" x2="18" y2="16.5"/>
  <line x1="12" y1="16.5" x2="12" y2="18"/>
  <rect x="9.5" y="18" width="5" height="2" rx="0.8"/>

</svg>
