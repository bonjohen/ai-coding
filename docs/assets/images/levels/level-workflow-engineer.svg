<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f09640" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="12" r="11.15"/>

  <!-- Pipeline: top box → splits to two → merges to bottom -->
  <rect x="9" y="3.5" width="6" height="3" rx="0.8"/>
  <line x1="12" y1="6.5" x2="12" y2="8"/>

  <!-- Branch left -->
  <line x1="12" y1="8" x2="6.5" y2="8"/>
  <line x1="6.5" y1="8" x2="6.5" y2="10"/>
  <rect x="4" y="10" width="5" height="3" rx="0.8"/>

  <!-- Branch right -->
  <line x1="12" y1="8" x2="17.5" y2="8"/>
  <line x1="17.5" y1="8" x2="17.5" y2="10"/>
  <rect x="15" y="10" width="5" height="3" rx="0.8"/>

  <!-- Merge -->
  <line x1="6.5" y1="13" x2="6.5" y2="15"/>
  <line x1="17.5" y1="13" x2="17.5" y2="15"/>
  <line x1="6.5" y1="15" x2="17.5" y2="15"/>
  <line x1="12" y1="15" x2="12" y2="17"/>
  <rect x="9" y="17" width="6" height="3" rx="0.8"/>

</svg>
